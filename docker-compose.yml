services:
  db:
    image: postgres:16
    container_name: student_db
    environment:
      POSTGRES_USER: kirill
      POSTGRES_PASSWORD: kirill
      POSTGRES_DB: student_db
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: student_api
    depends_on:
      - db
    env_file:
      - .env
    environment:
      POSTGRES_USER: kirill
      POSTGRES_PASSWORD: kirill
      POSTGRES_DB: student_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8001:8000"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  pg_data:
